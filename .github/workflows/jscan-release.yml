name: Release jscan

on:
  push:
    tags:
      - "jscan/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: jscan/go.mod
      - name: Prepare GoReleaser version tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#jscan/}"
          git tag --force "$VERSION" "$GITHUB_SHA"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config .goreleaser.yml
          workdir: jscan
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish prefixed-tag release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jscan/dist/*.tar.gz
            jscan/dist/*.zip
            jscan/dist/checksums.txt
          generate_release_notes: true

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: jscan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: jscan/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Build npm binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o npm/platforms/darwin-arm64/bin/jscan ./cmd/jscan
          GOOS=linux GOARCH=amd64 go build -o npm/platforms/linux-x64/bin/jscan ./cmd/jscan
          GOOS=linux GOARCH=arm64 go build -o npm/platforms/linux-arm64/bin/jscan ./cmd/jscan
          GOOS=windows GOARCH=amd64 go build -o npm/platforms/windows-x64/bin/jscan.exe ./cmd/jscan
          chmod +x npm/platforms/darwin-arm64/bin/jscan npm/platforms/linux-x64/bin/jscan npm/platforms/linux-arm64/bin/jscan
      - name: Set package versions
        run: |
          VERSION="${GITHUB_REF_NAME#jscan/v}"
          for dir in npm/platforms/*/; do
            npm version "$VERSION" --no-git-tag-version --prefix "$dir"
          done
          npm version "$VERSION" --no-git-tag-version --prefix npm
          node -e "const fs=require('fs');const p=require('./npm/package.json');for(const d of Object.keys(p.optionalDependencies))p.optionalDependencies[d]='$VERSION';fs.writeFileSync('npm/package.json',JSON.stringify(p,null,2)+'\n')"
      - name: Publish platform packages
        run: |
          for dir in npm/platforms/*/; do
            npm publish --access public --provenance "$dir"
          done
      - name: Publish main package
        run: npm publish --access public --provenance npm
